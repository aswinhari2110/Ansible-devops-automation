---
- name: Configure custom web page on dev server
  hosts: dev
  become: true
  tasks:
    - name: Install Apache
      dnf:
        name: httpd
        state: present

    - name: Create web page with development content
      copy:
        dest: /var/www/html/index.html
        content: "<h1>development\n<h1>"

    - name: Create symbolic link /webdev to /var/www/html
      file:
        src: /var/www/html
        dest: /webdev
        state: link

    - name: Set Apache DocumentRoot to /webdev
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^DocumentRoot '
        line: 'DocumentRoot "/webdev"'

    - name: Update Apache Directory block for /webdev
      replace:
        path: /etc/httpd/conf/httpd.conf
        regexp: '<Directory "/var/www/html">'
        replace: '<Directory "/webdev">'

    - name: Start and enable Apache
      service:
        name: httpd
        state: restarted
        enabled: true